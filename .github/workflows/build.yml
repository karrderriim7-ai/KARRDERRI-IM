name: Build Theos Tweak
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  THEOS: /Users/runner/theos

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Extract project
        run: python3 -c "import zipfile; zipfile.ZipFile('vannghia.zip').extractall('project/')"

      - name: Download API files
        run: |
          mkdir -p project/API
          curl -L https://raw.githubusercontent.com/baontq23/Logos-API-Authentication/main/API/APIClient.h -o project/API/APIClient.h
          curl -L https://raw.githubusercontent.com/baontq23/Logos-API-Authentication/main/API/libAPIClient.a -o project/API/libAPIClient.a

      - name: Patch source files
        run: python3 patch.py

      - name: Install dependencies
        run: brew install ldid xz make

      - name: Clone Theos
        run: git clone --recursive https://github.com/theos/theos.git $THEOS

      - name: Download iOS SDK
        run: |
          mkdir -p $THEOS/sdks
          curl -L --retry 3 https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz -o sdk.tar.xz
          tar -xJf sdk.tar.xz -C $THEOS/sdks/

      - name: Build
        working-directory: project
        run: |
          export THEOS=/Users/runner/theos
          export PATH=$THEOS/bin:$PATH
          gmake package FINALPACKAGE=1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 34306jit-dylib
          path: |
            project/.theos/obj/
            project/packages/
          if-no-files-found: warn
