name: Build Theos Tweak
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  THEOS: /Users/runner/theos

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Extract project
        run: |
          python3 -c "
          import zipfile, os
          with zipfile.ZipFile('vannghia.zip', 'r') as z:
              z.extractall('project/')
          "

      - name: Install dependencies
        run: brew install ldid xz make

      - name: Clone Theos
        run: git clone --recursive https://github.com/theos/theos.git $THEOS

      - name: Download iOS SDK
        run: |
          mkdir -p $THEOS/sdks
          curl -L --retry 3 \
            https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz \
            -o sdk.tar.xz
          tar -xJf sdk.tar.xz -C $THEOS/sdks/

      - name: Build
        working-directory: project
        run: |
          export THEOS=/Users/runner/theos
          export PATH=$THEOS/bin:$PATH
          gmake package FINALPACKAGE=1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 34306jit-dylib
          path: |
            project/.theos/obj/
            project/packages/
          if-no-files-found: warn
