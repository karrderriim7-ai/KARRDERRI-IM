name: Build Theos Tweak
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  THEOS: /Users/runner/theos

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract project
        run: |
          python3 -c "
          import zipfile, os
          with zipfile.ZipFile('vannghia.zip', 'r') as z:
              z.extractall('project/')
          "

      - name: Patch Makefile for Xcode 16 compatibility
        run: |
          python3 -c "
          import re
          with open('project/Makefile', 'r') as f:
              content = f.read()
          # Add Xcode 16 compatibility flags to CCFLAGS
          content = content.replace(
              '-fno-rtti',
              '-fno-rtti -fno-cxx-modules -Wno-module-import-in-extern-c -Wno-missing-template-arg-list-after-template-kw'
          )
          # Also patch CFLAGS
          content = content.replace(
              '-fobjc-arc',
              '-fobjc-arc -fno-cxx-modules -Wno-module-import-in-extern-c'
          )
          with open('project/Makefile', 'w') as f:
              f.write(content)
          print('Makefile patched!')
          "

      - name: Install dependencies
        run: brew install ldid xz make

      - name: Clone Theos
        run: git clone --recursive https://github.com/theos/theos.git $THEOS

      - name: Download iOS SDK
        run: |
          mkdir -p $THEOS/sdks
          curl -L --retry 3 \
            https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz \
            -o sdk.tar.xz
          tar -xJf sdk.tar.xz -C $THEOS/sdks/

      - name: Build
        working-directory: project
        run: |
          export THEOS=/Users/runner/theos
          export PATH=$THEOS/bin:$PATH
          gmake package FINALPACKAGE=1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 34306jit-dylib
          path: |
            project/.theos/obj/
            project/packages/
          if-no-files-found: warn
