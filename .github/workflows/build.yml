name: Build Theos Tweak
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  THEOS: /Users/runner/theos

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Extract project
        run: |
          python3 -c "
          import zipfile, os
          with zipfile.ZipFile('vannghia.zip', 'r') as z:
              z.extractall('project/')
          "

      - name: Download API authentication files
        run: |
          mkdir -p project/API
          curl -L https://raw.githubusercontent.com/baontq23/Logos-API-Authentication/main/API/APIClient.h -o project/API/APIClient.h
          curl -L https://raw.githubusercontent.com/baontq23/Logos-API-Authentication/main/API/libAPIClient.a -o project/API/libAPIClient.a

      - name: Patch source files
        run: |
          python3 -c "
          import os, re

          # 1. Change menu name @minhiosne -> @elbasanlliu1010
          draw_path = 'project/ImGuiDrawView.mm'
          if os.path.exists(draw_path):
              with open(draw_path, 'r') as f:
                  content = f.read()
              content = content.replace('@minhiosne', '@elbasanlliu1010')
              with open(draw_path, 'w') as f:
                  f.write(content)
              print('Patched menu name in ImGuiDrawView.mm')

          # 2. Patch Helper/Hooks.h - add chrono include
          hooks_path = 'project/Helper/Hooks.h'
          if os.path.exists(hooks_path):
              with open(hooks_path, 'r') as f:
                  content = f.read()
              if '#include <chrono>' not in content:
                  content = '#include <chrono>\n' + content
                  with open(hooks_path, 'w') as f:
                      f.write(content)
                  print('Patched Hooks.h')

          # 3. Patch Other/dobby_defines.h
          dobby_path = 'project/Other/dobby_defines.h'
          if os.path.exists(dobby_path):
              with open(dobby_path, 'r') as f:
                  content = f.read()
              if '#include <stdint.h>' in content and 'extern "C"' in content:
                  content = content.replace('#include <stdint.h>', '')
                  content = '#include <stdint.h>\n' + content
                  with open(dobby_path, 'w') as f:
                      f.write(content)
                  print('Patched dobby_defines.h')

          # 4. Patch Helper/Monostring.h
          mono_path = 'project/Helper/Monostring.h'
          if os.path.exists(mono_path):
              with open(mono_path, 'r') as f:
                  content = f.read()
              content = content.replace('->template toCPPlist()', '->toCPPlist()')
              with open(mono_path, 'w') as f:
                  f.write(content)
              print('Patched Monostring.h')

          # 5. Add API authentication to PubgLoad.mm
          pubg_path = 'project/Esp/PubgLoad.mm'
          if os.path.exists(pubg_path):
              with open(pubg_path, 'r') as f:
                  content = f.read()
              # Add import at top if not already there
              if '#import "../API/APIClient.h"' not in content:
                  content = '#import "../API/APIClient.h"\n' + content
              # Wrap the menu init inside apiclient_paid
              old_block = '''        if (!extraInfo) {
            extraInfo = [PubgLoad new];
        }
        [extraInfo initTapGes];
        [extraInfo initTapGes2];

        // Kích hoạt Menu và các hàm liên quan
        MenDeal = true; 
        kick_hacker_delayed();'''
              new_block = '''        apiclient_set_token("nV27GCsmVC/45wmNlAwcxHUtWgVuJgTAJTNkZ6q7uk+Ni0nwolEDstMEOrlEsxHyiUUj4M/7hRwYD6VApIf9c3kkgQYy6dWE/B69+eT5F0g=");
        apiclient_paid(^{
            if (!extraInfo) {
                extraInfo = [PubgLoad new];
            }
            [extraInfo initTapGes];
            [extraInfo initTapGes2];
            MenDeal = true;
            kick_hacker_delayed();
        });'''
              if old_block in content:
                  content = content.replace(old_block, new_block)
                  print('Patched PubgLoad.mm with API authentication')
              else:
                  print('WARNING: Could not find block to patch in PubgLoad.mm')
              with open(pubg_path, 'w') as f:
                  f.write(content)

          # 6. Patch Makefile to add API linker flag
          makefile_path = 'project/Makefile'
          if os.path.exists(makefile_path):
              with open(makefile_path, 'r') as f:
                  content = f.read()
              if 'API/libAPIClient.a' not in content:
                  content = content.replace(
                      '\$(TWEAK_NAME)_LDFLAGS +=',
                      '\$(TWEAK_NAME)_LDFLAGS += API/libAPIClient.a'
                  )
                  with open(makefile_path, 'w') as f:
                      f.write(content)
                  print('Patched Makefile with API linker flag')
          "

      - name: Install dependencies
        run: brew install ldid xz make

      - name: Clone Theos
        run: git clone --recursive https://github.com/theos/theos.git $THEOS

      - name: Download iOS SDK
        run: |
          mkdir -p $THEOS/sdks
          curl -L --retry 3 \
            https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz \
            -o sdk.tar.xz
          tar -xJf sdk.tar.xz -C $THEOS/sdks/

      - name: Build
        working-directory: project
        run: |
          export THEOS=/Users/runner/theos
          export PATH=$THEOS/bin:$PATH
          gmake package FINALPACKAGE=1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 34306jit-dylib
          path: |
            project/.theos/obj/
            project/packages/
          if-no-files-found: warn
