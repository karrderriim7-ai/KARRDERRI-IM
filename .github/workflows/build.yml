name: Build Theos Tweak
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract project
        run: |
          python3 -c "
          import zipfile, os
          with zipfile.ZipFile('vannghia.zip', 'r') as z:
              z.extractall('project/')
          "

      - name: Setup Theos
        uses: kabiroberai/theos-action@v2
        with:
          sdk-version: "16.5"
          theos-dir: ${{ github.workspace }}/theos

      - name: Build
        working-directory: project
        run: make package FINALPACKAGE=1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 34306jit-dylib
          path: |
            project/.theos/obj/
            project/packages/
          if-no-files-found: warn
